# Nginx snippet for /install.ps1 — cosmetic fix only.
#
# The script works WITHOUT this (irm ignores content-type), but applying it
# means:
#   - Browsers viewing https://odara.rs/install.ps1 show it inline instead
#     of downloading (transparency for security-minded users)
#   - Cloudflare won't aggressively cache as binary
#
# How to apply:
#   sudo nano /etc/nginx/sites-enabled/odara.rs
#   ... paste the two location blocks below INSIDE the server { } block,
#       BEFORE the catch-all `location / { ... }`
#   sudo nginx -t && sudo systemctl reload nginx

    # CLI installer: serve as plain text, never cache
    location = /install.ps1 {
        default_type text/plain;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /version.txt {
        default_type text/plain;
        add_header Cache-Control "no-cache, must-revalidate";
    }
